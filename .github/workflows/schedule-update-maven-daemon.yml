name: Update Maven Daemon SDK List

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-maven:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
      - name: Run update script
        run: python .github/scripts/update_maven_daemon.py
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Maven Daemon SDK list"
          branch: chore/update-maven-daemon
          delete-branch: true
          title: "Chore: Update Maven Daemon SDK list"
          body: |
            Automated update of `maven/daemon.json` from the Maven release API.
            Generated by the `scheduled-update-maven-daemon` workflow.
          labels: automated
          add-paths: maven/daemon.json

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "chore/update-maven-daemon" || true
