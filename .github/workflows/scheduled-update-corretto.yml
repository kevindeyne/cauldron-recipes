name: Update Corretto SDK List

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-corretto:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
      - name: Run update script
        run: python .github/scripts/update_corretto.py
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Corretto SDK list"
          branch: chore/update-corretto
          delete-branch: true
          title: "chore: update Corretto SDK list"
          body: |
            Automated update of `main/java/corretto.json` from the Corretto release API.
            Generated by the `scheduled-update-corretto` workflow.
          labels: automated
          add-paths: main/java/corretto.json

      - name: Enable auto-merge
        if: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "chore/update-corretto" || true
