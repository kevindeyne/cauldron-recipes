name: Update GraalVM SDK List

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update-graalvm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
      - name: Run update script
        run: python .github/scripts/update_graalvm.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update graalvm SDK list"
          branch: chore/update-graalvm
          delete-branch: true
          title: "Chore: Update GraalVM SDK list"
          body: |
            Automated update of `java/graalvm.json` from the GraalVM release API.
            Generated by the `scheduled-update-graalvm` workflow.
          labels: automated
          add-paths: java/graalvm.json

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash "chore/update-graalvm" || true
