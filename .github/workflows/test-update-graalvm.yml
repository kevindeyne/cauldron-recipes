name: Test GraalVM Update Script

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/scripts/update_graalvm.py'
  pull_request:
    paths:
      - '.github/scripts/update_graalvm.py'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
      - name: Install pytest
        run: pip install pytest
      - name: Run unit tests
        run: python3 -m pytest .github/scripts/test_update_graalvm.py -v
